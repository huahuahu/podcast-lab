<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" role="img" aria-labelledby="title desc">
  <title id="title">Podcast Lab Cover</title>
  <desc id="desc">Podcast Lab 的占位播客封面，用于 GitHub Pages 和 RSS metadata。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7dcc2"/>
      <stop offset="100%" stop-color="#e6b48a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f1e4d2"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1400" fill="url(#bg)"/>
  <circle cx="227" cy="232" r="240" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="1224" cy="1161" r="276" fill="#8e452a" fill-opacity="0.11"/>
  <rect x="126" y="126" width="1148" height="1148" rx="56" fill="url(#card)" stroke="#c99d74" stroke-width="4"/>
  <text x="180" y="286" fill="#a55031" font-size="52" font-family="Georgia, 'Times New Roman', serif" letter-spacing="10">PODCAST FEED</text>
  <text x="180" y="566" fill="#1f1a17" font-size="178" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Podcast</text>
  <text x="180" y="742" fill="#1f1a17" font-size="178" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Lab</text>
  <text x="184" y="888" fill="#6b625b" font-size="56" font-family="Georgia, 'Times New Roman', serif">中文播客整理与订阅 feed</text>
  <g transform="translate(930 276)">
    <circle cx="160" cy="160" r="154" fill="none" stroke="#b85c38" stroke-width="24"/>
    <circle cx="160" cy="160" r="84" fill="none" stroke="#b85c38" stroke-width="22" stroke-opacity="0.72"/>
    <circle cx="160" cy="160" r="12" fill="#b85c38"/>
    <path d="M160 0 A160 160 0 0 1 320 160" fill="none" stroke="#b85c38" stroke-width="18" stroke-linecap="round" stroke-opacity="0.8"/>
    <path d="M160 54 A106 106 0 0 1 266 160" fill="none" stroke="#b85c38" stroke-width="16" stroke-linecap="round" stroke-opacity="0.9"/>
  </g>
  <text x="184" y="1090" fill="#6b625b" font-size="42" font-family="Georgia, 'Times New Roman', serif">huahuahu.github.io/podcast-lab</text>
